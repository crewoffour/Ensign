name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  build-core-linux:
    runs-on: ubuntu-24.04
    container: swift:6.0
    steps:
      - uses: actions/checkout@v4
      - name: Build EnsignCore
        run: swift build --target EnsignCore
